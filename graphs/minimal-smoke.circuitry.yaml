circuitry: "0.2"
title: "pi-gnosis smoke graph program"
description: |
  Graph program for checking runtime input delivery and pi-gnosis graph execution.
runtime:
  provider: pi
  model: inherit
validation:
  rules:
    - no-self-loops
    - no-unknown-edge-endpoints
    - no-cycles
    - rule: require-executable-inputs
      executableKinds: [agent, tool]
resources:
  gnosis_config:
    type: text
    label: "Resolved pi-gnosis config"
    value: "{}"
  smoke_request:
    type: text
    label: "Runtime input"
    value: "{}"
  smoke_intake:
    type: agent
    identity: "Smoke Intake Station"
    model: inherit
    inputs: [smoke_request, gnosis_config]
    skills: [pi-gnosis]
    tools: []
    expect:
      request_received: bool
      config_received: bool
      execution_notes:
        type: list
        items: str
    instructions: |
      Read the runtime input and resolved config input. Confirm graph-program execution plumbing. Output only valid JSON matching expect.
  smoke_report:
    type: agent
    identity: "Smoke Report Station"
    model: inherit
    inputs: [smoke_intake]
    skills: [pi-gnosis]
    tools: []
    expect:
      status: str
      message: str
      next_step: str
    instructions: |
      Convert the intake result into a terse final smoke report. Output only valid JSON matching expect.
