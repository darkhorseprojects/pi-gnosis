circuitry: "0.2"
title: "pi-gnosis research graph program"
description: |
  Graph program for source-grounded learning research. Runtime input carries the research request; config input carries memory/storage settings.
runtime:
  provider: pi
  model: inherit
validation:
  rules:
    - no-self-loops
    - no-unknown-edge-endpoints
    - no-cycles
    - rule: require-executable-inputs
      executableKinds: [agent, tool]
resources:
  gnosis_config:
    type: text
    label: "Resolved pi-gnosis config"
    value: "{}"
  research_request:
    type: text
    label: "Runtime input"
    value: "{}"
  research_contract:
    type: text
    label: "Research contract"
    value: |
      Prefer primary, official, and high-quality sources. Keep source claims traceable. Separate evidence from interpretation. Produce learning-oriented outputs, not generic web summaries.
  intake_station:
    type: agent
    identity: "Research Intake Station"
    model: inherit
    inputs: [research_request, research_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      topic: str
      research_questions:
        type: list
        items: str
      learner_goal: str
      depth: str
      success_condition: str
    instructions: |
      Turn the runtime input into a bounded research job with clear questions and success criteria. Output only valid JSON matching expect.
  memory_audit_station:
    type: agent
    identity: "Prior Knowledge Station"
    model: inherit
    inputs: [intake_station, gnosis_config]
    skills: [pi-gnosis]
    tools: [read_file, grep]
    expect:
      known_notes:
        type: list
        items: str
      gaps:
        type: list
        items: str
      terms_to_preserve:
        type: list
        items: str
    instructions: |
      Use gnosis_config to inspect relevant learner notes when useful. Identify what is already known and what the research should fill. Do not write. Output only valid JSON matching expect.
  query_station:
    type: agent
    identity: "Query Design Station"
    model: inherit
    inputs: [intake_station, memory_audit_station, research_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      search_queries:
        type: list
        items: str
      source_types:
        type: list
        items: str
      exclusion_notes:
        type: list
        items: str
    instructions: |
      Design a small set of complementary searches that maximize source quality and reduce redundancy. Output only valid JSON matching expect.
  discovery_station:
    type: agent
    identity: "Source Discovery Station"
    model: inherit
    inputs: [query_station]
    skills: [pi-gnosis]
    tools: [exa_search, web_search]
    expect:
      candidate_sources:
        type: list
        items: str
      discovery_notes:
        type: list
        items: str
    instructions: |
      Run the planned searches. Prefer official docs, papers, reputable explainers, and primary sources. Output only valid JSON matching expect.
  extraction_station:
    type: agent
    identity: "Source Extraction Station"
    model: inherit
    inputs: [discovery_station, intake_station]
    skills: [pi-gnosis]
    tools: [fetch_content, web_search]
    expect:
      source_ledger:
        type: list
        items: str
      important_claims:
        type: list
        items: str
      weak_or_missing_evidence:
        type: list
        items: str
    instructions: |
      Fetch and extract the most relevant sources. Build a ledger with titles, URLs, and claims. Mark weak evidence plainly. Output only valid JSON matching expect.
  synthesis_station:
    type: agent
    identity: "Learning Synthesis Station"
    model: inherit
    inputs: [intake_station, memory_audit_station, extraction_station, research_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      explanation: str
      concept_map:
        type: list
        items: str
      misconceptions:
        type: list
        items: str
      review_prompts:
        type: list
        items: str
      citations:
        type: list
        items: str
    instructions: |
      Synthesize the research for learning. Keep claims tied to the source ledger. Produce concise teaching material and review prompts. Output only valid JSON matching expect.
  output_station:
    type: agent
    identity: "Research Output Station"
    model: inherit
    inputs: [synthesis_station, extraction_station, research_request]
    skills: [pi-gnosis]
    tools: []
    expect:
      learner_summary: str
      source_manifest:
        type: list
        items: str
      note_export_recommended: bool
      next_graph_hint: str
    instructions: |
      Package the final research output for Pi. If notes should be written, recommend the note-export graph program rather than writing here. Output only valid JSON matching expect.
