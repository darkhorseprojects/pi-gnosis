circuitry: "0.2"
title: "pi-gnosis tutoring graph program"
description: |
  Graph program for one adaptive tutoring turn. Runtime input carries learner request/context; config input carries durable memory settings.
runtime:
  provider: pi
  model: inherit
validation:
  rules:
    - no-self-loops
    - no-unknown-edge-endpoints
    - no-cycles
    - rule: require-executable-inputs
      executableKinds: [agent, tool]
resources:
  gnosis_config:
    type: text
    label: "Resolved pi-gnosis config"
    value: "{}"
  session_request:
    type: text
    label: "Runtime input"
    value: "{}"
  tutoring_contract:
    type: text
    label: "Tutoring contract"
    value: |
      Teach one useful next step. The learner may jump topics or change modality. Use open probes only: recall, explain, transfer, contrast, debug, teach-back, worked example, predict-observe-explain, or source-check. Never use multiple-choice diagnostics.
  intake_station:
    type: agent
    identity: "Tutoring Intake Station"
    model: inherit
    inputs: [session_request, tutoring_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      topic: str
      learner_intent: str
      desired_modality: str
      immediate_need: str
      memory_needed: bool
      success_condition: str
    instructions: |
      Parse the runtime input into a precise tutoring job. Decide what a successful next turn must accomplish. Output only valid JSON matching expect.
  memory_station:
    type: agent
    identity: "Learner Memory Station"
    model: inherit
    inputs: [intake_station, gnosis_config]
    skills: [pi-gnosis]
    tools: [read_file, grep]
    expect:
      relevant_memory:
        type: list
        items: str
      known_misconceptions:
        type: list
        items: str
      useful_prior_examples:
        type: list
        items: str
      missing_memory:
        type: list
        items: str
    instructions: |
      Use gnosis_config to locate learner memory when memory is useful. If memory is not needed or unavailable, say so without blocking the turn. Do not write. Output only valid JSON matching expect.
  move_station:
    type: agent
    identity: "Teaching Move Station"
    model: inherit
    inputs: [intake_station, memory_station, tutoring_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      response: str
      visual_or_ascii: str
      learner_probe: str
      why_this_move: str
      optional_next_modality: str
    instructions: |
      Produce the actual learner-facing tutoring turn. Keep it focused, clear, and active. Include a small probe unless the learner requested a pure artifact handoff. Output only valid JSON matching expect.
  memory_update_station:
    type: agent
    identity: "Memory Update Station"
    model: inherit
    inputs: [session_request, intake_station, move_station]
    skills: [pi-gnosis]
    tools: []
    expect:
      should_write: bool
      proposed_note_update: str
      reason: str
    instructions: |
      Decide whether this turn produced durable learner-memory information. Prepare a proposed note update only when the runtime input requests memory writing. Do not write. Output only valid JSON matching expect.
  output_station:
    type: agent
    identity: "Tutoring Output Station"
    model: inherit
    inputs: [move_station, memory_update_station]
    skills: [pi-gnosis]
    tools: []
    expect:
      learner_response: str
      memory_update_status: str
      next_graph_hint: str
    instructions: |
      Return the response Pi should say to the learner and any routing hint for video, notes, research, or interactive artifacts. Output only valid JSON matching expect.
