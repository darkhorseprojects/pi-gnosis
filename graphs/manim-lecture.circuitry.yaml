circuitry: "0.2"
title: "pi-gnosis Manim lecture graph program"
description: |
  Graph program for a Manim visual lecture. Runtime input carries the lecture request; config input carries artifact storage settings.
runtime:
  provider: pi
  model: inherit
validation:
  rules:
    - no-self-loops
    - no-unknown-edge-endpoints
    - no-cycles
    - rule: require-executable-inputs
      executableKinds: [agent, tool]
resources:
  gnosis_config:
    type: text
    label: "Resolved pi-gnosis config"
    value: "{}"
  lecture_request:
    type: text
    label: "Runtime input"
    value: "{}"
  lecture_contract:
    type: text
    label: "Lecture contract"
    value: |
      A visual lecture needs one narrative arc, few scenes, a visible aha moment, and minimal text. Use the bundled manim-video skill.
  intake_station:
    type: agent
    identity: "Lecture Intake Station"
    model: inherit
    inputs: [lecture_request, lecture_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      topic: str
      scope: str
      learner_goal: str
      render_requested: bool
      write_requested: bool
      success_condition: str
    instructions: |
      Parse the runtime input into a concrete Manim job. Output only valid JSON matching expect.
  state_station:
    type: agent
    identity: "Learning State Station"
    model: inherit
    inputs: [intake_station, gnosis_config]
    skills: [pi-gnosis]
    tools: [read, grep]
    expect:
      relevant_concepts:
        type: list
        items: str
      learner_bottlenecks:
        type: list
        items: str
      source_ids:
        type: list
        items: str
      missing_state:
        type: list
        items: str
    instructions: |
      Use gnosis_config to read relevant learning notes when present. Extract concepts, bottlenecks, and source ids that should influence the lecture. Do not write. Output only valid JSON matching expect.
  storyboard_station:
    type: agent
    identity: "Visual Storyboard Station"
    model: inherit
    inputs: [intake_station, state_station, lecture_contract]
    skills: [pi-gnosis, manim-video]
    tools: []
    expect:
      narrative_arc: str
      scenes:
        type: list
        items:
          name: str
          learning_goal: str
          visual_metaphor: str
          key_animation: str
          narration_beat: str
      aha_moment: str
      avoid:
        type: list
        items: str
    instructions: |
      Design the lecture as a compact Manim visual explanation. Prefer visible structure over text dumps. Output only valid JSON matching expect.
  project_station:
    type: agent
    identity: "Manim Project Station"
    model: inherit
    inputs: [lecture_request, gnosis_config, intake_station, storyboard_station, lecture_contract]
    skills: [pi-gnosis, manim-video]
    tools: [read, write, edit]
    expect:
      project_root: str
      files_written_or_planned:
        type: list
        items: str
      render_command: str
      cleanup_candidates:
        type: list
        items: str
    instructions: |
      Use gnosis_config to choose a project root. Create plan.md, scene_spec.json, script.py, render.sh, and README.md when lecture_request authorizes writes. Do not claim files exist unless the write tool succeeded. Do not render here. Output only valid JSON matching expect.
  preflight_station:
    type: agent
    identity: "Render Preflight Station"
    model: inherit
    inputs: [project_station]
    skills: [manim-video]
    tools: [read, bash]
    expect:
      can_render: bool
      checks:
        type: list
        items:
          name: str
          status: str
          detail: str
      draft_render_command: str
      blocker: str
    instructions: |
      Check whether the produced project can render: Python syntax, Manim CE, ffmpeg, and LaTeX only if MathTex is used. Do not pretend rendering succeeded. Output only valid JSON matching expect.
  quality_station:
    type: agent
    identity: "Lecture Quality Station"
    model: inherit
    inputs: [storyboard_station, project_station, preflight_station, lecture_contract]
    skills: [pi-gnosis, manim-video]
    tools: [read]
    expect:
      status: str
      learning_objective_match: str
      visual_risks:
        type: list
        items: str
      artifact_manifest:
        type: list
        items: str
      final_message: str
    instructions: |
      Review the graph output for learner fit, visual clarity, and artifact status. Return the final message Pi should summarize. Output only valid JSON matching expect.
