circuitry: "0.2"
title: "pi-gnosis note export graph program"
description: |
  Graph program for durable Obsidian learner notes. Runtime input carries note intent/content; config input carries note storage settings.
runtime:
  provider: pi
  model: inherit
validation:
  rules:
    - no-self-loops
    - no-unknown-edge-endpoints
    - no-cycles
    - rule: require-executable-inputs
      executableKinds: [agent, tool]
resources:
  gnosis_config:
    type: text
    label: "Resolved pi-gnosis config"
    value: "{}"
  export_request:
    type: text
    label: "Runtime input"
    value: "{}"
  note_contract:
    type: text
    label: "Note contract"
    value: |
      Obsidian is durable learner memory. Notes should be compact, useful for later recall, and linked to sources when sources exist. Avoid dumping transcripts.
  intake_station:
    type: agent
    identity: "Note Intake Station"
    model: inherit
    inputs: [export_request, note_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      topic: str
      note_kind: str
      content_units:
        type: list
        items: str
      write_requested: bool
      success_condition: str
    instructions: |
      Parse the runtime input into durable note units. Output only valid JSON matching expect.
  state_station:
    type: agent
    identity: "Existing Note State Station"
    model: inherit
    inputs: [intake_station, gnosis_config]
    skills: [pi-gnosis]
    tools: [read_file, grep]
    expect:
      existing_notes:
        type: list
        items: str
      merge_targets:
        type: list
        items: str
      conflicts:
        type: list
        items: str
    instructions: |
      Use gnosis_config to inspect relevant existing notes. Do not write. Output only valid JSON matching expect.
  plan_station:
    type: agent
    identity: "Note Plan Station"
    model: inherit
    inputs: [intake_station, state_station, note_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      note_actions:
        type: list
        items: str
      target_notes:
        type: list
        items: str
      planned_content: str
      risk_notes:
        type: list
        items: str
    instructions: |
      Plan the smallest correct note changes: create, merge, or append. Keep the plan learner-useful and non-performative. Output only valid JSON matching expect.
  writer_station:
    type: agent
    identity: "Note Writer Station"
    model: inherit
    inputs: [export_request, plan_station, state_station, gnosis_config]
    skills: [pi-gnosis]
    tools: [read_file, write_file, edit_file]
    expect:
      wrote_files: bool
      files_written_or_planned:
        type: list
        items: str
      skipped_reason: str
    instructions: |
      If apply_writes is true, write exactly the planned note changes using gnosis_config. If apply_writes is false, return planned files only. Output only valid JSON matching expect.
  quality_station:
    type: agent
    identity: "Note Quality Station"
    model: inherit
    inputs: [plan_station, writer_station, note_contract]
    skills: [pi-gnosis]
    tools: [read_file, grep]
    expect:
      status: str
      note_quality: str
      issues:
        type: list
        items: str
      manifest:
        type: list
        items: str
    instructions: |
      Check that notes are compact, useful, and written/planned as requested. Output only valid JSON matching expect.
