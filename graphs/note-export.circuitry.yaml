circuitry: "0.2"
title: "Pi-GNOSIS Obsidian Export Program"
description: |
  Frozen Circuitry program that turns the learner's existing notes and current session context into learner-facing Obsidian-compatible notes under a safe notes root.
runtime:
  provider: pi
  model: inherit
validation:
  rules:
    - no-self-loops
    - no-unknown-edge-endpoints
    - no-cycles
    - rule: require-executable-inputs
      executableKinds: [agent, tool]
resources:
  export_request:
    type: text
    label: "Note export request"
    value: |
      topic: ""
      notes_root: "notes"
      profile_note: "notes/profile.md"
      note_path: "notes"
      apply_writes: false
      overwrite_policy: "preserve-user-edits"
  obsidian_contract:
    type: text
    label: "Obsidian contract"
    value: |
      Obsidian is learner-facing memory and the source of truth for durable study material. Export 00-map.md, profile.md, source-ledger.md, concepts/*.md, misconceptions.md, probes.md, review-plan.md, reflection-log.md, sessions/*.md, and manifest.md. Preserve user edits where possible. Link concepts, sources, probes, and session notes.
  write_policy:
    type: text
    label: "Write policy"
    value: |
      Manifest first. Write only under the configured note_path. Do not delete notes. Do not overwrite user-authored sections unless explicitly asked. Mark generated sections with stable headers so future runs can update them safely.
  note_state_reader:
    type: agent
    identity: "Obsidian Note Reader"
    model: inherit
    inputs: [export_request, obsidian_contract]
    skills: [pi-gnosis]
    tools: [read_file, grep]
    expect:
      imported_note_summary: str
      source_ledger_available: bool
      concept_notes_available: bool
      session_notes_available: bool
      missing_inputs:
        type: list
        items: str
    instructions: |
      Read the requested notes only. Summarize available note sections and missing inputs. Do not write. Output only valid JSON matching expect.
  note_plan_builder:
    type: agent
    identity: "Obsidian Note Plan Builder"
    model: inherit
    inputs: [note_state_reader, obsidian_contract, write_policy]
    skills: [pi-gnosis]
    tools: []
    expect:
      files_to_create_or_update:
        type: list
        items:
          path: str
          purpose: str
          update_policy: str
      generated_section_ids:
        type: list
        items: str
      user_edit_risks:
        type: list
        items: str
    instructions: |
      Build a manifest-first note plan. Use the Obsidian contract. Make clear which sections are generated and which are preserved. Output only valid JSON matching expect.
  note_writer:
    type: agent
    identity: "Obsidian Note Writer"
    model: inherit
    inputs: [note_plan_builder, note_state_reader, obsidian_contract, write_policy]
    skills: [pi-gnosis]
    tools: [read_file, write_file, edit_file]
    expect:
      files_written_or_planned:
        type: list
        items: str
      manifest_path: str
      skipped_files:
        type: list
        items: str
      warnings:
        type: list
        items: str
    instructions: |
      If apply_writes is false, return planned content only. If writes are enabled by Pi, write only under note_path, manifest first. Preserve user sections. Include source ids and open-ended probes. Output only valid JSON matching expect.
  note_quality_gate:
    type: agent
    identity: "Obsidian Note Quality Gate"
    model: inherit
    inputs: [note_writer, obsidian_contract, note_state_reader]
    skills: [pi-gnosis]
    tools: [read_file, grep]
    expect:
      status: str
      missing_required_notes:
        type: list
        items: str
      unsupported_claims:
        type: list
        items: str
      weak_learning_sections:
        type: list
        items: str
      cleanup_candidates:
        type: list
        items: str
    instructions: |
      Verify generated notes against the contract. Check for missing source ids, missing probes, missing review prompts, broken internal links if possible, and accidental overwrite risk. Output only valid JSON matching expect.
