circuitry: "0.2"
title: "pi-gnosis interactive artifact graph program"
description: |
  Graph program for temporary learning pages, widgets, and Geist-style interactive labs. Runtime input carries the artifact request; config input carries artifact storage settings.
runtime:
  provider: pi
  model: inherit
validation:
  rules:
    - no-self-loops
    - no-unknown-edge-endpoints
    - no-cycles
    - rule: require-executable-inputs
      executableKinds: [agent, tool]
resources:
  gnosis_config:
    type: text
    label: "Resolved pi-gnosis config"
    value: "{}"
  artifact_request:
    type: text
    label: "Runtime input"
    value: "{}"
  artifact_contract:
    type: text
    label: "Artifact contract"
    value: |
      Temporary artifacts teach by interaction. Every lab/page needs orient, attempt, feedback, explanation, checkpoint, and reflection. Pages use zero-native. Rich labs use gnosis-geist-learning-lab patterns.
  intake_station:
    type: agent
    identity: "Artifact Intake Station"
    model: inherit
    inputs: [artifact_request, artifact_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      topic: str
      artifact_kind: str
      learner_goal: str
      write_requested: bool
      open_requested: bool
      success_condition: str
    instructions: |
      Parse the runtime input into a concrete temporary learning artifact job. The runtime artifact_request must include a real topic or learner_request, artifact_kind, learner_goal, and write/open intent. If artifact_request is empty or generic, set topic to "missing", write_requested false, open_requested false, and success_condition to "blocked: missing concrete artifact_request". Never invent a meta-learning artifact when the request is empty. Output only valid JSON matching expect.
  learning_loop_station:
    type: agent
    identity: "Learning Loop Station"
    model: inherit
    inputs: [intake_station, artifact_contract]
    skills: [pi-gnosis, gnosis-geist-learning-lab]
    tools: []
    expect:
      learning_objective: str
      orient: str
      attempt: str
      feedback_rule: str
      explanation: str
      checkpoint: str
      reflection: str
      misconception_to_surface: str
    instructions: |
      Design the smallest active learning loop for the concrete topic from intake_station. If intake_station reports a blocked or missing topic, output a blocked loop that asks for the missing artifact_request instead of designing a generic/meta lab. The learner should attempt before explanation. Avoid multiple-choice diagnostics. Output only valid JSON matching expect.
  surface_station:
    type: agent
    identity: "Surface Design Station"
    model: inherit
    inputs: [intake_station, learning_loop_station, artifact_contract]
    skills: [pi-gnosis, gnosis-geist-learning-lab]
    tools: []
    expect:
      surface_type: str
      design_system: str
      components:
        type: list
        items: str
      interaction_state:
        type: list
        items: str
      native_policy: str
      files_to_create:
        type: list
        items: str
    instructions: |
      Plan the zero-native surface for the concrete artifact topic and goal. For labs/widgets, use gnosis-geist-learning-lab patterns such as ParameterDock, QuickCheck, HintLadder, WorkedExample, InteractiveDiagram, BeforeAfterSplit, or TimelineExplorer. If intake_station is blocked or missing a concrete topic, keep files_to_create empty and surface_type "blocked". Output only valid JSON matching expect.
  writer_station:
    type: agent
    identity: "Artifact Writer Station"
    model: inherit
    inputs: [artifact_request, gnosis_config, intake_station, learning_loop_station, surface_station, artifact_contract]
    skills: [pi-gnosis]
    tools: [read, write, edit, bash]
    expect:
      artifact_root: str
      manifest_path: str
      files_written_or_planned:
        type: list
        items: str
      run_command: str
      open_command: str
      cleanup_candidates:
        type: list
        items: str
    instructions: |
      Use gnosis_config to choose an artifact root. Treat artifact_request.apply_writes true or intake_station.write_requested true as write authorization. If the request is blocked, missing a concrete topic, or missing artifact kind, do not write and explain the missing runtime input. If writes are authorized, write a runnable temporary artifact and its manifest before other files; do not claim files were written unless write succeeded. If writes are not authorized, return planned contents and commands. Output only valid JSON matching expect.
  quality_station:
    type: agent
    identity: "Artifact Quality Station"
    model: inherit
    inputs: [learning_loop_station, surface_station, writer_station, artifact_contract]
    skills: [pi-gnosis]
    tools: [read]
    expect:
      status: str
      active_learning_loop_present: bool
      native_policy_ok: bool
      artifact_manifest:
        type: list
        items: str
      final_message: str
    instructions: |
      Verify that the output is an active temporary learning artifact for the requested topic, not a passive page and not a generic/meta artifact. If writer_station says blocked or planned_not_written, status must be failed and final_message must state the exact missing input or write authorization. Check artifact status and opening instructions. Output only valid JSON matching expect.
