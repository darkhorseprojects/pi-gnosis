circuitry: "0.2"
title: "pi-gnosis interactive artifact graph program"
description: |
  Graph program for temporary learning pages, widgets, and Geist-style interactive labs. Runtime input carries the artifact request; config input carries artifact storage settings.
runtime:
  provider: pi
  model: inherit
validation:
  rules:
    - no-self-loops
    - no-unknown-edge-endpoints
    - no-cycles
    - rule: require-executable-inputs
      executableKinds: [agent, tool]
resources:
  gnosis_config:
    type: text
    label: "Resolved pi-gnosis config"
    value: "{}"
  artifact_request:
    type: text
    label: "Runtime input"
    value: "{}"
  artifact_contract:
    type: text
    label: "Artifact contract"
    value: |
      Temporary artifacts teach by interaction. Every lab/page needs orient, attempt, feedback, explanation, checkpoint, and reflection. Pages use zero-native. Rich labs use gnosis-geist-learning-lab patterns.
  intake_station:
    type: agent
    identity: "Artifact Intake Station"
    model: inherit
    inputs: [artifact_request, artifact_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      topic: str
      artifact_kind: str
      learner_goal: str
      write_requested: bool
      open_requested: bool
      success_condition: str
    instructions: |
      Parse the runtime input into a concrete temporary learning artifact job. Output only valid JSON matching expect.
  learning_loop_station:
    type: agent
    identity: "Learning Loop Station"
    model: inherit
    inputs: [intake_station, artifact_contract]
    skills: [pi-gnosis, gnosis-geist-learning-lab]
    tools: []
    expect:
      learning_objective: str
      orient: str
      attempt: str
      feedback_rule: str
      explanation: str
      checkpoint: str
      reflection: str
      misconception_to_surface: str
    instructions: |
      Design the smallest active learning loop. The learner should attempt before explanation. Avoid multiple-choice diagnostics. Output only valid JSON matching expect.
  surface_station:
    type: agent
    identity: "Surface Design Station"
    model: inherit
    inputs: [intake_station, learning_loop_station, artifact_contract]
    skills: [pi-gnosis, gnosis-geist-learning-lab]
    tools: []
    expect:
      surface_type: str
      design_system: str
      components:
        type: list
        items: str
      interaction_state:
        type: list
        items: str
      native_policy: str
      files_to_create:
        type: list
        items: str
    instructions: |
      Plan the zero-native surface. For labs/widgets, use gnosis-geist-learning-lab patterns such as ParameterDock, QuickCheck, HintLadder, WorkedExample, InteractiveDiagram, BeforeAfterSplit, or TimelineExplorer. Output only valid JSON matching expect.
  writer_station:
    type: agent
    identity: "Artifact Writer Station"
    model: inherit
    inputs: [artifact_request, gnosis_config, intake_station, learning_loop_station, surface_station, artifact_contract]
    skills: [pi-gnosis]
    tools: [read, write, edit, bash]
    expect:
      artifact_root: str
      manifest_path: str
      files_written_or_planned:
        type: list
        items: str
      run_command: str
      open_command: str
      cleanup_candidates:
        type: list
        items: str
    instructions: |
      Use gnosis_config to choose an artifact root. If apply_writes is true, write a runnable temporary artifact and its manifest before other files. If apply_writes is false, return planned contents and commands. Output only valid JSON matching expect.
  quality_station:
    type: agent
    identity: "Artifact Quality Station"
    model: inherit
    inputs: [learning_loop_station, surface_station, writer_station, artifact_contract]
    skills: [pi-gnosis]
    tools: [read]
    expect:
      status: str
      active_learning_loop_present: bool
      native_policy_ok: bool
      artifact_manifest:
        type: list
        items: str
      final_message: str
    instructions: |
      Verify that the output is an active temporary learning artifact, not a passive page. Check artifact status and opening instructions. Output only valid JSON matching expect.
