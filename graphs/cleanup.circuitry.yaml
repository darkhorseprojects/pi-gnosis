circuitry: "0.2"
title: "pi-gnosis cleanup graph program"
description: |
  Graph program for cleanup-safe temporary artifact review. Runtime input carries cleanup intent; config input carries temporary artifact roots.
runtime:
  provider: pi
  model: inherit
validation:
  rules:
    - no-self-loops
    - no-unknown-edge-endpoints
    - no-cycles
    - rule: require-executable-inputs
      executableKinds: [agent, tool]
resources:
  gnosis_config:
    type: text
    label: "Resolved pi-gnosis config"
    value: "{}"
  cleanup_request:
    type: text
    label: "Runtime input"
    value: "{}"
  cleanup_contract:
    type: text
    label: "Cleanup contract"
    value: |
      Cleanup is plan-first. Delete only temporary pi-gnosis artifacts that are safe by manifest, location, and explicit request. Never delete learner notes, source material, or promoted artifacts.
  intake_station:
    type: agent
    identity: "Cleanup Intake Station"
    model: inherit
    inputs: [cleanup_request, cleanup_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      artifact_hint: str
      deletes_requested: bool
      safety_boundary: str
      success_condition: str
    instructions: |
      Parse cleanup intent and define the safety boundary. Output only valid JSON matching expect.
  census_station:
    type: agent
    identity: "Artifact Census Station"
    model: inherit
    inputs: [intake_station, gnosis_config]
    skills: [pi-gnosis]
    tools: [read, grep, bash]
    expect:
      candidate_artifacts:
        type: list
        items: str
      protected_artifacts:
        type: list
        items: str
      missing_manifests:
        type: list
        items: str
    instructions: |
      Use gnosis_config to inventory candidate cleanup targets and protected outputs. Do not delete. Output only valid JSON matching expect.
  decision_station:
    type: agent
    identity: "Cleanup Decision Station"
    model: inherit
    inputs: [intake_station, census_station, cleanup_contract]
    skills: [pi-gnosis]
    tools: []
    expect:
      safe_to_delete:
        type: list
        items: str
      keep:
        type: list
        items: str
      blocked:
        type: list
        items: str
      explanation: str
    instructions: |
      Classify cleanup candidates. Require manifest/location confidence and explicit delete intent before deletion is allowed. Output only valid JSON matching expect.
  executor_station:
    type: agent
    identity: "Cleanup Executor Station"
    model: inherit
    inputs: [cleanup_request, decision_station, cleanup_contract]
    skills: [pi-gnosis]
    tools: [bash]
    expect:
      deleted:
        type: list
        items: str
      planned_only:
        type: list
        items: str
      skipped:
        type: list
        items: str
      final_message: str
    instructions: |
      If apply_deletes is true, delete only paths listed as safe_to_delete. Otherwise return a cleanup plan only. Output only valid JSON matching expect.
